<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招标雷达 · 贵州印刷包装</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #f0f4f9; --card: #fff; --text: #1a2c3e; --accent: #0b5e3c; --border: #e0e8da; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); padding:12px 8px; }
        .container { max-width:1600px; margin:0 auto; background:#fff; border-radius:24px; box-shadow:0 8px 28px -10px rgba(0,0,0,0.06); overflow:hidden; }
        .hero { background:linear-gradient(135deg,#0a3e2f,#1a6b4a); padding:22px 24px; color:#fff; }
        .hero h1 { font-size:24px; font-weight:700; }
        .hero-sub { opacity:0.9; font-size:13px; margin-top:6px; }
        .tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
        .tags span { background:rgba(255,255,255,0.15); border-radius:50px; padding:4px 11px; font-size:11px; }
        .stats { display:flex; flex-wrap:wrap; gap:8px; padding:12px 20px; background:#fafdf8; border-bottom:1px solid var(--border); font-size:12px; color:#4a6e52; }
        .stat { background:#fff; border-radius:30px; padding:6px 14px; border:1px solid #dce8d3; font-weight:500; }
        .stat strong { color:var(--accent); font-size:15px; }
        .toolbar { display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; padding:12px 20px; background:#fefef8; border-bottom:1px solid var(--border); }
        .fgroup { display:flex; gap:8px; flex-wrap:wrap; }
        select, input { padding:7px 12px; border-radius:30px; border:1px solid #cfdec5; background:#fff; font-size:12px; }
        input[type=text] { width:200px; }
        .btn { background:var(--accent); border:none; color:#fff; padding:8px 16px; border-radius:30px; font-weight:600; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
        .psec { padding:10px 20px; font-weight:600; color:#2a5e3e; border-bottom:1px solid var(--border); }
        .pgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px; padding:10px 20px; background:#fefef8; }
        .pcard { background:#fff; border-radius:16px; padding:8px 12px; display:flex; align-items:center; gap:10px; text-decoration:none; color:#1e4f3a; border:1px solid #e0e8da; }
        .pcard:hover { background:#eef6e8; }
        .twrap { overflow-x:auto; padding:8px 20px 20px; }
        table { width:100%; border-collapse:collapse; font-size:12px; min-width:1000px; }
        th { background:#f1f5ea; padding:10px 8px; text-align:left; font-weight:600; border-bottom:2px solid #cfdec5; }
        td { padding:8px 8px; border-bottom:1px solid #eef2e4; }
        .tag { display:inline-block; border-radius:20px; padding:3px 9px; font-size:10px; font-weight:600; background:#eef2e4; color:#2a5e3e; }
        .s-open { background:#e0f7e8; color:#1f7840; }
        .s-closed { background:#ffe6e2; color:#b33c1c; }
        .sbtn { background:#eef2ff; border:none; padding:4px 8px; border-radius:20px; font-size:10px; cursor:pointer; color:#295c8a; margin-right:4px; }
        .footer { padding:10px 20px; text-align:center; font-size:10px; border-top:1px solid var(--border); color:#5a6e4d; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1a2e22; color:#fff; padding:8px 18px; border-radius:30px; font-size:11px; z-index:999; opacity:0; transition:opacity 0.2s; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🏭 贵州印刷·包装·酒盒 招标雷达</h1>
        <div class="hero-sub">动态数据 · 整合茅台/习酒等平台 | 酒盒礼盒·食品包装·手提袋·出版物·商务印刷</div>
        <div class="tags">
            <span>🍶 酒盒/礼盒</span><span>📦 包装印刷</span><span>🏢 供应商招募</span>
            <span>📖 出版物</span><span>🥡 食品包装</span><span>🖨️ 商务印刷</span>
        </div>
    </div>
    <div class="stats" id="statsRow"></div>
    <div class="toolbar">
        <div class="fgroup">
            <select id="typeFilter">
                <option value="all">全部类型</option>
                <option value="供应商招募">供应商入库/招募</option>
                <option value="酒类包装">酒类包装</option>
                <option value="包装印刷">包装印刷</option>
                <option value="食品包装">食品包装</option>
                <option value="出版物印刷">出版物印刷</option>
                <option value="商务印刷">商务印刷</option>
            </select>
            <select id="regionFilter">
                <option value="all">全部地区</option>
                <option value="贵州">贵州省内</option>
                <option value="贵阳">贵阳</option>
                <option value="遵义">遵义</option>
                <option value="仁怀">仁怀</option>
                <option value="毕节">毕节</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索项目或单位">
            <button id="resetBtn" class="sbtn" style="color:#4a6e52;background:#fff;border:1px solid #cfdec5;">重置</button>
        </div>
        <div style="display:flex;gap:8px;">
            <button id="refreshBtn" class="btn"><i class="fas fa-sync-alt"></i> 刷新</button>
            <button id="exportBtn" class="btn"><i class="fas fa-file-excel"></i> 导出Excel</button>
        </div>
    </div>
    <div class="psec"><i class="fas fa-star-of-life" style="color:#e67e22;"></i> 贵州省核心平台</div>
    <div class="pgrid" id="gzPlatforms"></div>
    <div class="psec"><i class="fas fa-globe"></i> 全国性平台</div>
    <div class="pgrid" id="natPlatforms"></div>
    <div class="psec"><i class="fas fa-list-ul"></i> 最新招标项目</div>
    <div class="twrap">
        <table>
            <thead><tr><th>序号</th><th>项目名称</th><th>采购单位</th><th>类型</th><th>发布日期</th><th>截止日期</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="8" style="text-align:center;padding:30px;">正在加载数据…</td></tr></tbody>
        </table>
    </div>
    <div class="footer">📌 数据来源：内置备份数据 + data.json（优先） | ⚠️ 以官方公告为准</div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
(function() {
    // ===== 内置备份数据，确保页面永不为空 =====
    const BUILTIN_DATA = [
        { name:"仁怀酱酒集团酒盒供应商入围", company:"仁怀酱酒集团", type:"酒类包装", pubDate:"2026-04-30", deadline:"2026-05-06", status:"入围公示", keyword:"酒盒 礼盒", region:"仁怀", platform:"黔云招采", refUrl:"http://www.mchcjt.com/" },
        { name:"茅台保健酒业包材采购", company:"茅台保健酒业", type:"包装印刷", pubDate:"2026-04-28", deadline:"2026-05-15", status:"招标中", keyword:"包装物资", region:"仁怀", platform:"保健酒业官网", refUrl:"https://bjj.moutai.com.cn/" },
        { name:"茅台文旅供应商招募", company:"茅台文旅", type:"供应商招募", pubDate:"2026-04-10", deadline:"2026-06-30", status:"招募中", keyword:"酒盒 文创", region:"仁怀", platform:"茅台文旅", refUrl:"https://www.mtwhly.com/" },
        { name:"贵州出版集团教材印刷", company:"贵州出版集团", type:"出版物印刷", pubDate:"2026-04-20", deadline:"2026-05-15", status:"招标中", keyword:"教材印刷", region:"贵阳", platform:"贵州省公共资源交易中心", refUrl:"https://ggzy.guizhou.gov.cn/" },
        { name:"老干妈纸箱包装采购", company:"贵阳南明老干妈", type:"食品包装", pubDate:"2026-04-28", deadline:"2026-05-20", status:"招标中", keyword:"纸箱", region:"贵阳", platform:"贵州招标网", refUrl:"https://guizhou.zhaobiao.cn/" }
    ];

    let allData = [...BUILTIN_DATA];   // 默认就用内置数据
    let currentData = [];
    let filterType = 'all', filterRegion = 'all', filterKeyword = '';

    const tableBody = document.getElementById('tableBody');
    const toast = document.getElementById('toastMsg');

    function showToast(msg) {
        toast.textContent = msg; toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2200);
    }

    // 尝试加载 data.json，如果成功且非空就替换内置数据
    async function loadExternalData() {
        try {
            const res = await fetch('data.json');
            if (!res.ok) throw new Error('无 data.json');
            const json = await res.json();
            if (Array.isArray(json) && json.length > 0) {
                allData = json;
                showToast(`✅ 已加载外部数据 ${json.length} 条`);
            }
        } catch (e) {
            console.log('使用内置演示数据');
        }
        updateStats();
        applyFilter();
    }

    function updateStats() {
        const total = allData.length;
        const gzCount = allData.filter(i => i.region !== '其他地区').length;
        const openCount = allData.filter(i => i.status === '招标中' || i.status === '招募中' || i.status === '入围公示').length;
        document.getElementById('statsRow').innerHTML = `
            <span class="stat"><i class="fas fa-database"></i> 总数：<strong>${total}</strong></span>
            <span class="stat"><i class="fas fa-map-pin"></i> 贵州：<strong>${gzCount}</strong></span>
            <span class="stat"><i class="fas fa-hourglass-half"></i> 进行中：<strong>${openCount}</strong></span>
        `;
    }

    function applyFilter() {
        let filtered = allData;
        if (filterType !== 'all') filtered = filtered.filter(i => i.type === filterType);
        if (filterRegion !== 'all') {
            if (filterRegion === '贵州') filtered = filtered.filter(i => i.region !== '其他地区');
            else filtered = filtered.filter(i => i.region === filterRegion);
        }
        if (filterKeyword.trim()) {
            const kw = filterKeyword.trim().toLowerCase();
            filtered = filtered.filter(i => (i.name||'').includes(kw) || (i.company||'').includes(kw));
        }
        currentData = filtered;
        renderTable();
    }

    function renderTable() {
        if (!currentData.length) {
            tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;">暂无匹配项目</td></tr>';
            return;
        }
        let html = '';
        currentData.forEach((item, i) => {
            const cls = (item.status === '招标中' || item.status === '招募中' || item.status === '入围公示') ? 's-open' : 's-closed';
            html += `<tr>
                <td>${i+1}</td>
                <td><strong>${item.name||''}</strong><br><small>📍${item.region||''} · ${item.keyword||''}</small></td>
                <td>${item.company||''}</td>
                <td><span class="tag">${item.type||''}</span></td>
                <td>${item.pubDate||''}</td>
                <td>${item.deadline||''}</td>
                <td><span class="${cls}" style="border-radius:20px;padding:3px 8px;font-size:10px;">${item.status||''}</span></td>
                <td>
                    <button class="sbtn" data-url="${item.refUrl||'#'}" data-name="${item.name||''}">🔍 搜公告</button>
                    <button class="sbtn" data-copy="${item.name||''}">📋 复制</button>
                </td>
            </tr>`;
        });
        tableBody.innerHTML = html;
    }

    // 事件委托
    tableBody.addEventListener('click', e => {
        const btn = e.target.closest('button');
        if (!btn) return;
        if (btn.dataset.url) {
            navigator.clipboard.writeText(btn.dataset.name);
            showToast('已复制项目名，即将打开平台');
            if (btn.dataset.url !== '#') window.open(btn.dataset.url, '_blank');
        } else if (btn.dataset.copy) {
            navigator.clipboard.writeText(btn.dataset.copy);
            showToast('已复制到剪贴板');
        }
    });

    document.getElementById('typeFilter').addEventListener('change', e => { filterType = e.target.value; applyFilter(); });
    document.getElementById('regionFilter').addEventListener('change', e => { filterRegion = e.target.value; applyFilter(); });
    document.getElementById('searchInput').addEventListener('input', e => { filterKeyword = e.target.value; applyFilter(); });
    document.getElementById('resetBtn').addEventListener('click', () => {
        filterType = 'all'; filterRegion = 'all'; filterKeyword = '';
        document.getElementById('typeFilter').value = 'all';
        document.getElementById('regionFilter').value = 'all';
        document.getElementById('searchInput').value = '';
        applyFilter();
    });
    document.getElementById('refreshBtn').addEventListener('click', loadExternalData);
    document.getElementById('exportBtn').addEventListener('click', () => {
        if (!currentData.length) return;
        const wsdata = [["序号","项目名称","采购单位","类型","发布日期","截止日期","状态","地区"]];
        currentData.forEach((item,i) => wsdata.push([i+1, item.name, item.company, item.type, item.pubDate, item.deadline, item.status, item.region]));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsdata), "招标清单");
        XLSX.writeFile(wb, `招标雷达_${new Date().toISOString().slice(0,10)}.xlsx`);
        showToast('导出成功');
    });

    // 渲染平台卡片
    const gzPlats = [
        { name:"黔云招采", url:"https://www.e-qyzc.com/", icon:"fa-cloud-upload-alt", desc:"贵州国企采购" },
        { name:"贵州招标投标公共服务平台", url:"http://ztb.guizhou.gov.cn/", icon:"fa-file-alt", desc:"全省公告" },
        { name:"贵州省公共资源交易中心", url:"https://ggzy.guizhou.gov.cn/", icon:"fa-university", desc:"政府采购" },
        { name:"茅台文旅官网", url:"https://www.mtwhly.com/", icon:"fa-wine-bottle", desc:"供应商招募" },
        { name:"遵义交易中心", url:"https://ggzyjy.zunyi.gov.cn/", icon:"fa-map-pin", desc:"遵义招标" }
    ];
    const natPlats = [
        { name:"中国招标投标公共服务平台", url:"http://www.cebpubservice.com/", icon:"fa-chart-line" },
        { name:"千里马招标网", url:"https://www.qianlima.com/", icon:"fa-search-dollar" }
    ];
    document.getElementById('gzPlatforms').innerHTML = gzPlats.map(p => 
        `<a href="${p.url}" target="_blank" class="pcard"><i class="fas ${p.icon}"></i><div><strong>${p.name}</strong><br><small>${p.desc}</small></div></a>`).join('');
    document.getElementById('natPlatforms').innerHTML = natPlats.map(p => 
        `<a href="${p.url}" target="_blank" class="pcard"><i class="fas ${p.icon}"></i><div><strong>${p.name}</strong></div></a>`).join('');

    // 直接显示内置数据，同时异步尝试加载外部 JSON
    updateStats();
    applyFilter();
    loadExternalData();
})();
</script>
</body>
</html>
